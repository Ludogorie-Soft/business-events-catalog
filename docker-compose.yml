services:
  postgres:
    image: postgres:16-alpine
    container_name: bec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bec
      POSTGRES_PASSWORD: bec_dev_password
      POSTGRES_DB: business_events_catalog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
